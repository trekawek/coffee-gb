name: Maven release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version (for example, 1.7.5)
        required: true
        type: string
      development_version:
        description: Next development version (for example, 1.7.6-SNAPSHOT)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: maven-release
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ inputs.release_version }}
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: maven-central

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java and Maven Central credentials
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN

      - name: Configure the release commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
        run: |
          version_pattern='^[0-9A-Za-z][0-9A-Za-z._-]*$'

          if [[ ! "$RELEASE_VERSION" =~ $version_pattern || "$RELEASE_VERSION" == *-SNAPSHOT ]]; then
            echo "release_version must be a valid non-SNAPSHOT Maven version" >&2
            exit 1
          fi

          if [[ ! "$DEVELOPMENT_VERSION" =~ $version_pattern || "$DEVELOPMENT_VERSION" != *-SNAPSHOT ]]; then
            echo "development_version must be a valid Maven version ending in -SNAPSHOT" >&2
            exit 1
          fi

      - name: Check release secrets
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=()
          [[ -n "$MAVEN_CENTRAL_USERNAME" ]] || missing+=(MAVEN_CENTRAL_USERNAME)
          [[ -n "$MAVEN_CENTRAL_TOKEN" ]] || missing+=(MAVEN_CENTRAL_TOKEN)
          [[ -n "$MAVEN_GPG_KEY" ]] || missing+=(MAVEN_GPG_PRIVATE_KEY)
          [[ -n "$MAVEN_GPG_PASSPHRASE" ]] || missing+=(MAVEN_GPG_PASSPHRASE)

          if (( ${#missing[@]} )); then
            printf 'Missing release secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Prepare and perform the Maven release
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          -Dgpg.signer=bc
          "-DreleaseVersion=${RELEASE_VERSION}"
          "-DdevelopmentVersion=${DEVELOPMENT_VERSION}"
          "-Dtag=coffee-gb-${RELEASE_VERSION}"
          "-Darguments=-Dmaven.javadoc.skip=true -Dgpg.signer=bc --no-transfer-progress"
          release:clean release:prepare release:perform
