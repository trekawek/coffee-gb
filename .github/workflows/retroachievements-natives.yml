name: Build RetroAchievements natives

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "controller/src/main/native/**"
      - ".github/workflows/retroachievements-natives.yml"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.resource-prefix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            resource-prefix: linux-x86-64
            cmake_options: ""
          - runner: ubuntu-22.04-arm
            resource-prefix: linux-aarch64
            cmake_options: ""
          - runner: windows-latest
            resource-prefix: win32-x86-64
            cmake_options: ""
          - runner: macos-15-intel
            resource-prefix: darwin-x86-64
            cmake_options: -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          - runner: macos-14
            resource-prefix: darwin-aarch64
            cmake_options: -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

    steps:
      - uses: actions/checkout@v4

      - name: Configure rcheevos wrapper
        run: >-
          cmake -S controller/src/main/native -B native-build
          -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake_options }}

      - name: Build rcheevos wrapper
        run: cmake --build native-build --config Release --parallel

      - name: Stage native library
        shell: bash
        run: >-
          cmake --install native-build --config Release
          --prefix "native-artifact/${{ matrix.resource-prefix }}"

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Install staged native for the ABI smoke test
        shell: bash
        run: cp -R native-artifact/* controller/src/main/resources/

      - name: Run native ABI smoke test
        run: >-
          mvn -B -pl controller -am test
          -Dtest=RetroAchievementsNativeTest
          -Dsurefire.failIfNoSpecifiedTests=false

      - uses: actions/upload-artifact@v4
        with:
          name: coffee-rcheevos-${{ matrix.resource-prefix }}
          path: native-artifact/
          if-no-files-found: error
